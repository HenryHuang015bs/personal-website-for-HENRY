  <path d="M5 9.5l7 3.5v3.5l-7-3.5V9.5z" fill="url(#unityGradient1)" opacity="0.9"/>
  <!-- Hexagon outer frame - right side -->
  <path d="M19 9.5v3.5l-7 3.5v-3.5l7-3.5z" fill="#1A1A1A"/>
